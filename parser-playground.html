<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Parser Playground</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 500px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
        }
        pre {
            background: #1e293b;
            color: #f8fafc;
            padding: 15px;
            border-radius: 8px;
            height: 500px;
            overflow: auto;
            margin: 0;
            font-size: 13px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        p { color: #64748b; margin-bottom: 24px; }
        .controls { margin-top: 20px; text-align: right; }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .stats {
            margin-top: 10px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <h1>Quest Parser Playground</h1>
    <p>Paste your Quest schedule text on the left to see the parsing results on the right.</p>
    
    <div class="container">
        <div>
            <textarea id="input" placeholder="Paste Quest text here..."></textarea>
            <div class="controls">
                <div id="stats" class="stats"></div>
                <button onclick="runParser()">Run Parser</button>
            </div>
        </div>
        <div>
            <pre id="output">// Results will appear here</pre>
        </div>
    </div>

    <script>
        // --- Parser Logic (Inlined for simplicity) ---
        function parseQuestSchedule(rawText) {
            const rawLines = rawText.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
            const fullText = rawLines.join("\n");
            const termMatch = fullText.match(/(Winter|Spring|Fall)\s\d{4}/i);
            const term = termMatch ? termMatch[0] : "Unknown Term";
            const courseBlocks = fullText.split(/\n(?=[A-Z]{2,8}\s\d+[A-Z]?\s*-\s*)/);
            const courses = [];

            for (const block of courseBlocks) {
                const blockLines = block.split("\n");
                if (blockLines.length === 0) continue;
                const headerMatch = blockLines[0].match(/^([A-Z]{2,8}\s\d+[A-Z]?)/);
                const courseCode = headerMatch ? headerMatch[1] : "Unknown";

                for (let i = 0; i < blockLines.length; i++) {
                    const line = blockLines[i];
                    const tokens = line.split(/\s+/);
                    const typeIdx = tokens.findIndex(t => /^(LEC|TUT|LAB)$/.test(t));
                    
                    if (typeIdx !== -1) {
                        let classNbr = "";
                        let section = "";
                        const type = tokens[typeIdx];

                        if (typeIdx >= 2 && /^\d{3,5}$/.test(tokens[typeIdx-2]) && /^\d{1,3}$/.test(tokens[typeIdx-1])) {
                            classNbr = tokens[typeIdx-2];
                            section = tokens[typeIdx-1];
                        } else if (i >= 2 && /^\d{3,5}$/.test(blockLines[i-2]) && /^\d{1,3}$/.test(blockLines[i-1])) {
                            classNbr = blockLines[i-2];
                            section = blockLines[i-1];
                        }

                        if (classNbr && section) {
                            let dateLineIdx = -1;
                            for (let k = i; k < Math.min(i + 10, blockLines.length); k++) {
                                if (blockLines[k].match(/(\d{2,4}[/-]\d{2}[/-]\d{2,4})\s*-\s*(\d{2,4}[/-]\d{2}[/-]\d{2,4})/)) {
                                    dateLineIdx = k;
                                    break;
                                }
                            }

                            if (dateLineIdx !== -1) {
                                const sameLineSuffix = tokens.slice(typeIdx + 1).join(" ");
                                const midLines = blockLines.slice(i + 1, dateLineIdx);
                                const rawInfoLines = [sameLineSuffix, ...midLines].filter(Boolean);

                                let timeLine = "TBA";
                                let roomLine = "TBA";
                                const instructorParts = [];

                                for (const infoLine of rawInfoLines) {
                                    if (infoLine.match(/(\d+:\d+|TBA)/) && timeLine === "TBA") {
                                        timeLine = infoLine;
                                    } else if (roomLine === "TBA" && !infoLine.includes(",")) {
                                        roomLine = infoLine;
                                    } else {
                                        instructorParts.push(infoLine.replace(/To be Announced/g, "").trim());
                                    }
                                }

                                const instructor = instructorParts.filter(Boolean).join(", ").replace(/,\s*,/g, ",").trim() || null;
                                const dateMatch = blockLines[dateLineIdx].match(/(\d{2,4}[/-]\d{2}[/-]\d{2,4})\s*-\s*(\d{2,4}[/-]\d{2}[/-]\d{2,4})/);
                                
                                if (dateMatch) {
                                    courses.push({
                                        courseCode,
                                        type,
                                        section,
                                        time: timeLine,
                                        room: roomLine,
                                        instructor,
                                        dates: dateMatch[0]
                                    });
                                }
                                i = dateLineIdx;
                            }
                        }
                    }
                }
            }
            return { term, count: courses.length, courses };
        }

        function runParser() {
            const input = document.getElementById('input').value;
            const output = document.getElementById('output');
            const stats = document.getElementById('stats');
            
            try {
                const result = parseQuestSchedule(input);
                output.textContent = JSON.stringify(result, null, 2);
                stats.textContent = `Found ${result.count} components for ${result.term}`;
            } catch (err) {
                output.textContent = "Error: " + err.message;
                stats.textContent = "";
            }
        }
    </script>
</body>
</html>
